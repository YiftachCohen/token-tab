<?xml version="1.0" encoding="UTF-8"?>
<!-- Token Tab — wordmark lockup (V1 · Gauge): two-tone ring + the name. -->
<svg xmlns="http://www.w3.org/2000/svg" width="148" height="24" viewBox="0 0 148 24">
  <!-- gauge ring (20px), vertically centered -->
  <g transform="translate(2 2)">
    <circle cx="10" cy="10" r="8" fill="none" stroke="#d8d5cf" stroke-width="2.67"/>
    <circle cx="10" cy="10" r="8" fill="none" stroke="#2e9e63" stroke-width="2.67"
            stroke-linecap="round" stroke-dasharray="50.27" stroke-dashoffset="18.6"
            transform="rotate(-90 10 10)"/>
  </g>
  <text x="30" y="17" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif"
        font-size="16" font-weight="700" letter-spacing="-0.32" fill="#1c1d22">Token Tab</text>
</svg>
